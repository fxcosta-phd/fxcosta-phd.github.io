- title: 'The biological clock of multimorbidity: temporal dynamics of disease co-occurrence in primary care'
  authors: J. Sanchez-Valle, C. Zambrana, A. Navarro-Martinez, <strong>F.X. Costa</strong>, L.M. Rocha, D. Cirillo, C. Violan, A. Valencia
  abstract: Multimorbidity is the dominant clinical reality of primary care, yet the temporal dynamics governing when and how persistent comorbidity associations emerge remain poorly characterised. Most large-scale comorbidity studies adopt a single observation window after an index diagnosis, implicitly assuming that associations detectable at one year are equally detectable at five. Using 11 years of electronic health records from 5,821,197 individuals in Catalan primary care, we applied a matched cohort design across nine complementary follow-up windows, five cumulative (0-1 to 0-5 years) and four conditional (1-2 to 4-5 years), to 1,315 index diseases, identifying 144,030 significant directed comorbidity associations in the five-year network. We found that 60.1% of these associations required at least three years of follow-up and were undetectable in shorter-window analyses, demonstrating that observation window length is a primary determinant of which comorbidities can be observed. To organise this temporal heterogeneity, we introduce the biological clock of multimorbidity, a two-dimensional framework that positions ICD-10 disease categories according to their rates of cumulative signal attenuation and the persistence of conditional risk. This framework identifies four reproducible temporal patterns (episodic, chronic stable, chronic progressive, and transient-persistent) that are robust under bootstrap resampling, leave-one-disease-out sensitivity analysis, and alternative clustering approaches. The biological clock is systematically modulated by sex, with Blood/Immune and Musculoskeletal disorders showing the largest sex differences in temporal dynamics. Network analysis identified 19 disease "initiators" that generate broad downstream comorbidity burdens and 21 "sinks" representing convergent endpoints of multiple disease trajectories. Comparison with hospital-based Danish data from 6,909,676 individuals showed that shared associations were 2.7-fold enriched over chance expectation (hypergeometric test, p<10-300) and showed moderate concordance of effect sizes (Spearman r=0.460), confirming that the comorbidity structure identified here reflects genuine, generalisable signal; nonetheless, only 3.6% of primary care associations were replicated in the hospital network, indicating that the two settings capture largely complementary segments of the disease co-occurrence landscape. Together, these findings establish the observation window length as a principal design parameter in EHR-based multimorbidity research and the biological clock as a framework for understanding how and over what timescale disease associations emerge, persist, and resolve.
  urlink: https://www.medrxiv.org/content/10.64898/2026.06.15.26355655v1
  id: biological_clock_multimorbidity
  year: 2026

- title: Distance Backbones Optimize Spreading Dynamics and Centrality Ranks in the Sparsification of Complex Networks
  authors: B. Pereira, <strong>F.X. Costa</strong>, L.M. Rocha
  abstract: Detailed network models of social, biological and other complex systems are often dense, which increases their computational complexity in simulations and analysis. To address this challenge, graph sparsification is used to remove edges while preserving desired network properties. Distance backbones of weighted graphs, which remove edges that break a generalized triangle inequality for any given path-length measure, preserve all shortest paths of weighted graphs. They have been shown to typically sparsify graphs more, as well as preserve community structure and spreading dynamics better than alternative state-of-the-art methods. Here, We show that they significantly best preserve node centrality ranks, as well as local and global dynamics in spreading phenomena. This is done by introducing the distance backbone synthesis (DBS) to progressively sparsify weighted graphs according to a general family of nested distance backbones, whereby each edge is associated with the smallest distance backbone in which it appears. DBS provides a principled and natural method to sweep all degrees of sparsification possible while preserving connectivity, allowing us to precisely study (directed and undirected) weighted graph sparsification under multi-objective criteria. It provides an algebraically-principled explanation of edge importance by revealing the precise topological space associated with each edge. The theory is demonstrated with a battery of social contact networks obtained from real-world social activity in different scenarios. Our study also shows that the optimal preservation of node centrality and spreading dynamics happens for the distance backbone obeying the generalized triangle inequality for the path-length measure g(x, y)=(x^(1/3) + y^(1/3))^3, which removes more than half of the edges from the empirical networks studied.
  urlink: https://arxiv.org/abs/2603.14564
  id: distance_backbone_synthesis
  year: 2026