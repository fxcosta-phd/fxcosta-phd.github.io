- name: Networks in Biology and Medicine 2026 Symposium
  image: netbiomed_logo.png
  description: NetBioMed 2026 will bring together researchers working from molecular relationships to individual patient treatments towards solving complex biomedical problems across scales. Logo designed by <a href="https://romanayanez.github.io/">Romana Yáñez</a>.<br> I was the <strong>symposium program chair</strong> organizing the event alongside an amazing team. 
